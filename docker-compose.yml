services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .secrets
    volumes:
      - event-data:/app/data
    # gitignored — never committed
    # Alternatively, pass keys inline:
    # environment:
    #   - OPENROUTER_API_KEY=your_key
    #   - MASSIVE_API_KEY=your_key

  monitor-api:
    build: .
    command: ["uvicorn", "src.monitoring_api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - event-data:/app/data
    environment:
      DB_PATH: data/events.db

  monitor-ui:
    build: .
    command: ["streamlit", "run", "monitoring.py", "--server.port=8502", "--server.address=0.0.0.0"]
    ports:
      - "8502:8502"
    volumes:
      - event-data:/app/data
    environment:
      DB_PATH: data/events.db
      MONITOR_API_URL: http://monitor-api:8000
    depends_on:
      - monitor-api

  test:
    build: .
    command: ["pytest", "-v", "--tb=short"]
    profiles:
      - test

  lint:
    build: .
    # Override with any check command, e.g.:
    #   docker compose run --build --rm lint ruff check .
    #   docker compose run --build --rm lint ruff format --check .
    #   docker compose run --build --rm lint mypy src/
    #   docker compose run --build --rm lint pytest --cov=src --cov-report=term-missing --cov-fail-under=90 -v --tb=short
    command: ["sh", "-c", "ruff check . && ruff format --check . && mypy src/"]
    profiles:
      - lint

  event-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: events
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    volumes:
      - pg-data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  event-data:
  pg-data:
